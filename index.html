<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ГИМС Практика PRO</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;padding:15px}
h1{text-align:center}
.card{background:#1e293b;border-radius:12px;padding:15px;margin:12px 0}
button{background:#22c55e;color:white;border:none;padding:14px;border-radius:10px;width:100%;font-size:18px;cursor:pointer}
#title{font-size:24px;font-weight:bold;margin-bottom:10px}
#content{white-space:pre-line;line-height:1.7}
.small{opacity:.8}
</style>
</head>
<body>

<h1>🚤 ГИМС Практика PRO</h1>

<div class="card">
<div id="title">Нажмите "Следующий этап"</div>
<div id="content">Тренажёр проговаривания действий судоводителя.</div>
</div>

<div class="card">
<button onclick="nextStep()">Следующий этап ▶</button>
</div>

<div class="card small">
<b>Совет:</b> читайте текст вслух как инспектору на экзамене.
</div>

<script>
const steps=[
{
title:"Осмотр судна",
text:`Приступаю к осмотру судна.

Проверяю наличие спасательных жилетов.
Проверяю наличие огнетушителя.
Проверяю наличие якоря.
Проверяю наличие швартовых концов.
Проверяю наличие конца Александрова.
Осматриваю корпус на отсутствие повреждений.
Проверяю наличие топлива.
Проверяю исправность рулевого управления.

Судно к эксплуатации подготовлено.`
},
{
title:"Подготовка к запуску двигателя",
text:`Надеваю спасательный жилет.

Проверяю наличие жилетов у всех находящихся на борту.

Проверяю нейтральное положение редуктора.

Закрепляю страховочную чеку аварийной остановки двигателя.

Запускаю двигатель.

Двигатель работает устойчиво.`
},
{
title:"Отход от причала",
text:`Осматриваю акваторию.

Убеждаюсь в безопасности манёвра.

Отдаю швартовые концы.

Включаю задний ход.

Отхожу от причала на безопасное расстояние.

Включаю передний ход.

Продолжаю движение.`
},
{
title:"Разворот",
text:`Осматриваю акваторию.

Убеждаюсь в безопасности манёвра.

Выполняю плавный разворот.

Выравниваю судно на новом курсе.

Продолжаю движение.`
},
{
title:"Движение задним ходом",
text:`Осматриваю акваторию.

Убеждаюсь в безопасности манёвра.

Включаю задний ход.

Контролирую направление движения.

Завершаю манёвр.`
},
{
title:"Человек за бортом",
text:`ЧЕЛОВЕК ЗА БОРТОМ!

Объект визуально контролирую.

Не теряю объект из вида.

Выполняю циркуляцию.

Подхожу против ветра или течения.

Снижаю скорость.

Останавливаюсь рядом с пострадавшим.`
},
{
title:"Постановка на якорь",
text:`Снижаю скорость судна.

Перевожу двигатель на нейтраль.

Отдаю якорь.

Травлю якорный канат.

Контролирую удержание судна.

Якорь держит.

Судно стоит на якоре.`
},
{
title:"Снятие с якоря",
text:`Выбираю якорный канат.

Якорь панер.

Продолжаю выборку каната.

Якорь встал.

Поднимаю якорь на борт.

Осматриваю якорь.

Якорь чист.

Закрепляю якорь.

Продолжаю движение.`
},
{
title:"Подход к причалу",
text:`Заранее снижаю скорость.

Подхожу к причалу малым ходом.

Контролирую положение судна.

Останавливаю судно.

Подаю швартовый конец.

Швартую судно.

Перевожу двигатель на нейтраль.

Глушу двигатель.

Судно пришвартовано.

Экзаменационное задание выполнено.`
}
];

let i=-1;

function nextStep(){
i++;
if(i>=steps.length)i=0;
document.getElementById('title').innerText=steps[i].title;
document.getElementById('content').innerText=steps[i].text;
}
</script>

</body>
</html>
